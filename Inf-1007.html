<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Intelligence Dashboard 2026</title>
  <style>
    :root {
      --bg: #0b0914;
      --card-bg: #13112b;
      --text: #f1f3f5;
      --text-muted: #868e96;
      --accent: #4dabf7;
      --border: rgba(255, 255, 255, 0.08);
      --hover-bg: rgba(255, 255, 255, 0.03);
    }
    .light {
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #212529;
      --text-muted: #6c757d;
      --accent: #1c7ed6;
      --border: rgba(0, 0, 0, 0.08);
      --hover-bg: rgba(0, 0, 0, 0.02);
    }

    body {
      margin: 0; padding: 2rem; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); transition: background 0.2s ease, color 0.2s ease;
      min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
    }

    .wrapper { width: 100%; max-width: 1100px; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 0.5rem; }
    
    .dashboard-container {
      background: var(--card-bg); border-radius: 16px; padding: 1.5rem;
      border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      contain: content;
    }

    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .search-wrapper { position: relative; flex-grow: 1; }
    .search-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); fill: var(--text-muted); width: 18px; height: 18px; }
    input {
      width: 100%; padding: 12px 16px 12px 42px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.15); color: var(--text); font-size: 0.95rem; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .light input { background: rgba(0,0,0,0.02); }
    input:focus { outline: none; border-color: var(--accent); }

    #toggle-btn {
      padding: 0 1.2rem; border-radius: 10px; border: 1px solid var(--border);
      background: var(--card-bg); cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 0.5rem; font-weight: 500;
      transition: transform 0.1s ease, background 0.2s;
    }
    #toggle-btn:active { transform: scale(0.97); }

    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 1rem; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; }
    th:hover { color: var(--text); }
    td { padding: 1rem; border-top: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; }
    
    tr { transform: translateZ(0); transition: background-color 0.15s ease; }
    tbody tr:hover { background: var(--hover-bg); }

    .name-cell { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; color: var(--text); text-decoration: none; }
    .name-cell:hover { color: var(--accent); }

    .tag { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.3rem; }
    .cat-chat { background: rgba(63, 81, 181, 0.15); color: #7986cb; }
    .cat-search { background: rgba(0, 150, 136, 0.15); color: #4db6ac; }
    .cat-productivity { background: rgba(255, 152, 0, 0.15); color: #ffb74d; }
    .cat-open-source { background: rgba(156, 39, 176, 0.15); color: #ba68c8; }
    .cat-agent-services { background: rgba(233, 30, 99, 0.15); color: #f06292; }
    
    .launch-btn { 
      padding: 6px 14px; background: var(--accent); color: #fff !important; border-radius: 6px; font-size: 0.8rem; 
      font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .launch-btn:hover { opacity: 0.9; text-decoration: none; }
    .launch-btn:active { transform: scale(0.96); }

    .icon { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <h1>
      <svg class="icon" style="width:28px; height:28px; fill:var(--accent);" viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2m0 2a8 8 0 0 1 8 8c0 1.9-.66 3.65-1.78 5.03l-1.42-1.42a6 6 0 0 0 .2-1.61c0-3.31-2.69-6-6-6a6 6 0 0 0-1.61.2L9.97 6.78C11.35 6.66 13.1 6 15 6a8 8 0 0 1-3-2M9 9a3 3 0 0 1 3-3 3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3m-4.03 3c0-1.9.66-3.65 1.78-5.03l1.42 1.42a6 6 0 0 0-.2 1.61c0 3.31 2.69 6 6 6c.55 0 1.1-.08 1.61-.2l1.42 1.42C13.65 19.34 11.9 20 10 20a8 8 0 0 1-5.03-8z"/></svg>
      AI Hub 2026
    </h1>
    <button id="toggle-btn" onclick="toggleMode()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6m0-14c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8z"/></svg>
      Theme
    </button>
  </header>

  <div class="dashboard-container">
    <div class="controls">
      <div class="search-wrapper">
        <svg viewBox="0 0 24 24"><path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5z"/></svg>
        <input id="filter-input" placeholder="Search interfaces, traits, categories..." oninput="filterTable()">
      </div>
    </div>
    
    <div class="table-scroll">
      <table id="ai-table">
        <thead>
          <tr>
            <th onclick="sortTable(0)">Service</th>
            <th onclick="sortTable(1)">Category</th>
            <th onclick="sortTable(2)">Primary Capability</th>
            <th style="width:80px;">Link</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const services = [
    { name: "ChatGPT", cat: "Chat", url: "https://chat.com", strength: "Industry baseline, advanced reasoning & GPT-4o multimodal workflows" },
    { name: "Gemini", cat: "Chat", url: "https://gemini.google.com", strength: "Massive context window & native Google ecosystem integration" },
    { name: "Claude", cat: "Chat", url: "https://claude.ai", strength: "Gold standard for engineering, complex logic, and nuanced writing" },
    { name: "Perplexity", cat: "Search", url: "https://www.perplexity.ai", strength: "Conversational web answers built on cited, real-time research synthesis" },
    { name: "Arena AI (LMSYS)", cat: "Open Source", url: "https://chat.lmsys.org", strength: "Crowdsourced blind LLM testing arena & benchmarking hub" },
    { name: "Grok", cat: "Chat", url: "https://grok.com", strength: "Unfiltered real-time data ingestion via global X.com data streams" },
    { name: "DeepSeek", cat: "Chat", url: "https://www.deepseek.com", strength: "Highly efficient reasoning and competitive coding architectures" },
    { name: "Copilot (open source)", cat: "Open Source", url: "https://github.com", strength: "Extensible open framework for local alternative programming assistants" },
    { name: "Meta‑AI", cat: "Chat", url: "https://meta.ai", strength: "Llama-powered fast conversational engine embedded inside social applications" },
    { name: "YouChat", cat: "Search", url: "https://you.com", strength: "Customizable LLM search modes combined with file reading execution" },
    { name: "Poe", cat: "Chat", url: "https://poe.com", strength: "Aggregator sandbox access to multiple model endpoints with custom bot layers" },
    { name: "Mistral", cat: "Open Source", url: "https://chat.mistral.ai", strength: "High-velocity European developer-centric lightweight open models" },
    { name: "Groq", cat: "Open Source", url: "https://groq.com", strength: "Blazing fast LPU (Language Processing Unit) hardware inference speeds" },
    { name: "Cohere", cat: "Productivity", url: "https://cohere.com", strength: "Enterprise search, text classification, and highly targeted RAG generation" },
    { name: "Hugging Face", cat: "Open Source", url: "https://huggingface.co", strength: "The definitive library hub for open source AI model repositories and Spaces" },
    { name: "Manus AI", cat: "Agent Services", url: "https://manus.im", strength: "General-purpose agent executing complex multi-step browser & app work" },
    { name: "Genspark.ai", cat: "Agent Services", url: "https://www.genspark.ai", strength: "Generates custom mini-synthetic consensus engines for precise analysis" },
    { name: "Lindy.ai", cat: "Agent Services", url: "https://www.lindy.ai", strength: "Constructs custom operations-oriented AI employees for routine back-office tasks" }
  ];

  const icons = {
    "chat": '<svg class="icon cat-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>',
    "search": '<svg class="icon cat-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 5 1.5-1.5-5-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>',
    "productivity": '<svg class="icon cat-productivity" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
    "open source": '<svg class="icon cat-open-source" viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.9 3.51 9 8.18 9.83a1 1 0 0 0 1.05-.99V18c-3.15.57-3.66-1.5-3.66-1.5-.54-1.37-1.32-1.74-1.32-1.74-1.02-.7.08-.69.08-.69 1.13.08 1.73 1.16 1.73 1.16.98 1.71 2.6 1.2 3.23.93.1-.72.39-1.21.71-1.49-2.48-.28-5.08-1.24-5.08-5.5 0-1.22.44-2.21 1.15-2.99-.11-.28-.5-1.42.11-2.95 0 0 .94-.3 3.07 1.14A10.7 10.7 0 0 1 12 6.5c.96.01 1.92.13 2.83.38 2.13-1.44 3.07-1.14 3.07-1.14.62 1.53.23 2.67.12 2.95.72.78 1.15 1.77 1.15 2.99 0 4.28-2.6 5.22-5.09 5.5.4.34.76 1.02.76 2.06v3.07c0 .61.45.92 1.06.82A10.003 10.003 0 0 0 22 12A10 10 0 0 0 12 2z"/></svg>',
    "agent services": '<svg class="icon cat-agent-services" viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2v1.1C17.61 5.66 20 9 20 13c0 4.42-3.58 8-8 8s-8-3.58-8-8c0-4 2.39-7.34 6-7.9V4c0-1.1.9-2 2-2zm0 13.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 10.5 12 10.5s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>'
  };

  const body = document.getElementById('table-body');
  let currentSort = { col: null, desc: false };

  function renderTable(data) {
    const fragment = document.createDocumentFragment();
    
    for (let i = 0; i < data.length; i++) {
      const s = data[i];
      const tr = document.createElement('tr');
      const lowerCat = s.cat.toLowerCase();
      
      tr.innerHTML = `
        <td><a class="name-cell" href="${s.url}" target="_blank" rel="noopener">${s.name}</a></td>
        <td><span class="tag cat-${lowerCat.replace(/\s+/g, '-')}">${icons[lowerCat] || ''}${s.cat}</span></td>
        <td>${s.strength}</td>
        <td>
          <a href="${s.url}" target="_blank" rel="noopener" class="launch-btn">
            Launch
            <svg class="icon" style="width:11px; height:11px;" viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.41L9.41 16 8 14.59 17.59 5H14V3zM5 5h5V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-5h-2v5H5V5z"/></svg>
          </a>
        </td>
      `;
      fragment.appendChild(tr);
    }
    
    body.innerHTML = '';
    body.appendChild(fragment);
  }

  function filterTable() {
    const query = document.getElementById('filter-input').value.toLowerCase();
    
    if (!query) { return renderTable(services); }

    const filtered = [];
    for (let i = 0; i < services.length; i++) {
      const s = services[i];
      if (s.name.toLowerCase().includes(query) || 
          s.cat.toLowerCase().includes(query) || 
          s.strength.toLowerCase().includes(query)) {
        filtered.push(s);
      }
    }
    renderTable(filtered);
  }

  function sortTable(colIndex) {
    const keys = ['name', 'cat', 'strength'];
    const key = keys[colIndex];
    
    currentSort.desc = (currentSort.col === colIndex) ? !currentSort.desc : false;
    currentSort.col = colIndex;

    services.sort((a, b) => {
      const valA = a[key].toLowerCase();
      const valB = b[key].toLowerCase();
      return currentSort.desc ? valB.localeCompare(valA) : valA.localeCompare(valB);
    });

    filterTable();
  }

  function toggleMode() {
    document.body.classList.toggle('light');
  }

  renderTable(services);
</script>
</body>
</html>
