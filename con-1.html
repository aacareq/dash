<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Inference Harness Engine v1.2.0</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #141b2d;
            --accent-glow: #00ffcc;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #232d45;
            --error-color: #ff3366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .brand-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseGlow 3s infinite alternate;
        }

        .build-tag {
            font-family: monospace;
            font-size: 11px;
            color: #0077ff;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
            height: calc(100vh - 100px);
        }

        /* Harness Control Panel Left Side */
        .harness-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-glow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            background: #070b14;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-glow);
        }

        .context-box { height: 120px; }
        .prompt-box { height: 80px; }

        /* Real-time Diagnostics Terminal Widget */
        .diagnostic-terminal {
            background: #04070d;
            border: 1px solid #1e293b;
            border-radius: 6px;
            height: 120px;
            font-family: monospace;
            font-size: 11px;
            color: #38bdf8;
            padding: 8px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .macro-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .macro-btn {
            background: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .macro-btn:hover {
            background: var(--accent-glow);
            color: #000;
            font-weight: bold;
        }

        /* Execution Grid Right Side */
        .execution-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            grid-auto-rows: max-content;
            gap: 15px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 140px;
        }

        .service-card:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .service-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .tier-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #1e293b;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .service-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            line-height: 1.3;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .quick-tag {
            font-size: 10px;
            color: var(--accent-glow);
            font-family: monospace;
        }

        .fire-btn {
            background: linear-gradient(135deg, #0055ff, #00ffcc);
            color: #fff;
            border: none;
            padding: 7px 16px;
            font-size: 11px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        /* Instant Click Visual Feedback Overrides */
        .fire-btn.clicked-state {
            background: linear-gradient(135deg, #ff0055, #ffcc00) !important;
            transform: scale(0.92);
        }

        /* Hidden input helper for rock-solid clipboard copying */
        #clipboardHelper {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 2px rgba(0,255,204,0.4)); }
            100% { filter: drop-shadow(0 0 10px rgba(0,255,204,0.8)); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <div class="brand-block">
            <h1>⚡ AI INFERENCE SUPERSTACK HARNESS</h1>
            <div class="build-tag">STACK_VERSION: 1.2.0-Alpha (Diagnostic Core Active)</div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 11px; font-family: monospace; color: var(--text-muted)">FIRES: <span id="fireCount" style="color:#fff;">0</span></span>
            <span class="indicator" id="statusDot" style="width:8px; height:8px; background-color:#00ffcc; border-radius:50%; display:inline-block; box-shadow: 0 0 8px #00ffcc;"></span>
            <span id="statusText" style="font-size: 12px; color: var(--text-muted); font-family: monospace;">READY TO ORCHESTRATE</span>
        </div>
    </header>

    <textarea id="clipboardHelper"></textarea>

    <div class="container">
        <div class="harness-panel">
            <div class="panel-title">1. Context Payload Window</div>
            <textarea class="context-box" id="contextPayload" placeholder="// Paste large context, raw code, JSON arrays..."></textarea>
            
            <div class="panel-title">2. Prompt Templates</div>
            <div class="macro-grid">
                <button class="macro-btn" onclick="injectTemplate('expert')">💻 Staff Architect</button>
                <button class="macro-btn" onclick="injectTemplate('json')">📦 Strict JSON</button>
                <button class="macro-btn" onclick="injectTemplate('debug')">🪲 Deep Debug</button>
                <button class="macro-btn" onclick="injectTemplate('optimize')">🚀 Optimize Performance</button>
            </div>

            <div class="panel-title">3. Active Instruction</div>
            <textarea class="prompt-box" id="activeInstruction" placeholder="What task are we launching across the stacks?"></textarea>

            <div class="panel-title">🎛️ Local Engine Diagnostics</div>
            <div class="diagnostic-terminal" id="terminalLog">[SYSTEM SYSTEM INITIALIZED] -> Harness Standalone Ready.</div>
        </div>

        <div class="execution-grid" id="serviceGrid"></div>
    </div>

    <script>
        let counter = 0;
        const terminal = document.getElementById('terminalLog');

        const templates = {
            expert: "Act as a Principal Staff Engineer and Systems Architect. Review the following payload for logical cohesion, structural performance, and edge cases:\n\n",
            json: "Transform the provided target context into a perfectly formatted, schema-validated JSON structure. Return ONLY raw JSON code block without filler text:\n\n",
            debug: "Execute a structural trace analysis on the payload below. Identify structural bugs, runtime flaws, or optimization choke points:\n\n",
            optimize: "Refactor the context payload for extreme runtime execution efficiency and lower computational footprint:\n\n"
        };

        const aiServices = [
            { name: "ChatGPT", tier: "Free Workhorse", desc: "GPT-4o daily free tier access and rapid conversations.", url: "https://chatgpt.com/" },
            { name: "Gemini", tier: "Free Workhorse", desc: "Massive context payload capacities.", url: "https://gemini.google.com/" },
            { name: "DeepSeek", tier: "Free Workhorse", desc: "Top tier reasoning capacity with great unthrottled access.", url: "https://chat.deepseek.com/" },
            { name: "Perplexity", tier: "Specialized Search", desc: "Real-time discovery web searches and source linking.", url: "https://www.perplexity.ai/" },
            { name: "Genspark", tier: "Specialized Search", desc: "High premium model selection through daily credit allocations.", url: "https://www.genspark.ai/" },
            { name: "Groq", tier: "Hardware LPU Speed", desc: "Instant token inference using open-weights models.", url: "https://groq.com/" },
            { name: "Claude", tier: "Raw Reasoning", desc: "Extremely high fidelity responses, restricted message budget.", url: "https://claude.ai/new" },
            { name: "Meta‑AI", tier: "Free Workhorse", desc: "Fast open source Llama iteration framework.", url: "https://www.meta.ai/" },
            { name: "Poe", tier: "Aggregator Hub", desc: "Multi-bot aggregation index tool via free pool cycles.", url: "https://poe.com/" },
            { name: "YouChat", tier: "Specialized Search", desc: "Alternative live-index web generation engine.", url: "https://you.com/" },
            { name: "Mistral", tier: "Open Alternative", desc: "Le Chat access to European flagship open-weights structures.", url: "https://chat.mistral.ai/" },
            { name: "Copilot", tier: "Dev Native", desc: "Web companion code inference engine layer.", url: "https://copilot.microsoft.com/" },
            { name: "Hugging Face", tier: "Developer Space", desc: "Open playground inference nodes across hundreds of models.", url: "https://huggingface.co/chat" },
            { name: "Cohere", tier: "Developer Space", desc: "Enterprise-focused retrieval and embedding playgrounds.", url: "https://dashboard.cohere.com/" },
            { name: "Manus AI", tier: "Autonomous Agent", desc: "Agent-mode automation tasks via daily refresh credits.", url: "https://manus.im/" },
            { name: "Lindy.ai", tier: "Autonomous Agent", desc: "Workflow agent engine with 400 monthly base task credits.", url: "https://www.lindy.ai/" },
            { name: "Grok", tier: "Real-time X Core", desc: "Direct access interface to real-time unstructured data streams.", url: "https://x.com/i/grok" }
        ];

        function logToTerminal(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const colorPrefix = isError ? "[ERROR]" : "[OK]";
            terminal.innerHTML += `\n${timestamp} ${colorPrefix} ${message}`;
            terminal.scrollTop = terminal.scrollHeight; 
        }

        function injectTemplate(key) {
            const currentInstruction = document.getElementById('activeInstruction').value;
            document.getElementById('activeInstruction').value = templates[key] + currentInstruction;
            logToTerminal(`Injected template macro [${key}]`);
        }

        function renderServices() {
            const grid = document.getElementById('serviceGrid');
            grid.innerHTML = '';
            
            aiServices.forEach(srv => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.setAttribute('data-tier', srv.tier);

                card.innerHTML = `
                    <div class="card-header">
                        <span class="service-name">${srv.name}</span>
                        <span class="tier-badge">${srv.tier}</span>
                    </div>
                    <div class="service-desc">${srv.desc}</div>
                    <div class="action-bar">
                        <span class="quick-tag">READY</span>
                        <button class="fire-btn" onclick="fireHarness(event, this, '${srv.name}', '${srv.url}')">EXECUTE</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function fireHarness(event, buttonElement, serviceName, url) {
            event.stopPropagation();
            
            // 1. Add instant physical css feedback class
            buttonElement.classList.add('clicked-state');
            setTimeout(() => buttonElement.classList.remove('clicked-state'), 200);

            counter++;
            document.getElementById('fireCount').innerText = counter;

            logToTerminal(`Initiated firing engine for target: ${serviceName}`);

            const context = document.getElementById('contextPayload').value;
            const instruction = document.getElementById('activeInstruction').value;
            
            let completeStack = "";
            if (instruction) completeStack += instruction + "\n\n";
            if (context) completeStack += "=== CONTEXT DATA PAYLOAD ===\n" + context;

            // 2. Clipboard Processing Step Execution
            if (completeStack.trim() !== "") {
                logToTerminal(`Compiling payload stack (${completeStack.length} chars)...`);
                
                navigator.clipboard.writeText(completeStack).then(() => {
                    logToTerminal(`Clipboard write successful via standard API.`);
                    launchTab(url, serviceName);
                }).catch(err => {
                    logToTerminal(`Standard Clipboard API blocked. Invoking fallback architecture...`, true);
                    
                    const helper = document.getElementById('clipboardHelper');
                    helper.value = completeStack;
                    helper.select();
                    helper.setSelectionRange(0, 99999);
                    
                    try {
                        const success = document.execCommand('copy');
                        if (success) {
                            logToTerminal(`Fallback clipboard write successful.`);
                            launchTab(url, serviceName);
                        } else {
                            logToTerminal(`Fallback clipboard rejected selection.`, true);
                            launchTab(url, serviceName);
                        }
                    } catch (fallbackErr) {
                        logToTerminal(`Critical: Clipboard completely blocked by runtime environments.`, true);
                        launchTab(url, serviceName);
                    }
                });
            } else {
                logToTerminal(`Payload container empty. Direct routing fallback engaged.`);
                launchTab(url, serviceName);
            }
        }

        function launchTab(url, serviceName) {
            logToTerminal(`Attempting to request external browser tab for ${serviceName}...`);
            const targetWindow = window.open(url, '_blank');
            
            if (!targetWindow || targetWindow.closed || typeof targetWindow.closed == 'undefined') {
                logToTerminal(`ALERT: Tab creation BLOCKED by browser pop-up blocker! Allow popups for this local file!`, true);
                alert(`Popup Blocked! Please check your URL address bar settings and allow popups for this page to open ${serviceName}.`);
            } else {
                logToTerminal(`Tab handoff completed successfully for ${serviceName}.`);
                updateStatusTracker(`DISPATCHED ${serviceName.toUpperCase()}`);
            }
        }

        function updateStatusTracker(msg) {
            const txt = document.getElementById('statusText');
            txt.innerText = msg;
            txt.style.color = "#00ffcc";
            setTimeout(() => {
                txt.innerText = "READY TO ORCHESTRATE";
                txt.style.color = "#94a3b8";
            }, 2500);
        }

        renderServices();
    </script>
</body>
</html>
