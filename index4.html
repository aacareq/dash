<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator Control Dashboard</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --border-color: #30363d;
      --text-primary: #c9d1d9;
      --text-muted: #8b949e;
      --text-accent: #58a6ff;
      --neon-glow: rgba(88, 166, 255, 0.12);
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-stack);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Layout Structure */
    #sidebar {
      width: 25%;
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      overflow-y: auto;
    }
    
    #main-content {
      width: 75%;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      overflow-y: auto;
    }
    
    .brand {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.5px;
      color: var(--text-accent);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
    }

    /* Navigation Elements */
    .tab-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    
    .tab-btn {
      width: 100%;
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.65rem 0.85rem;
      text-align: left;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 120ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .tab-btn:hover {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .tab-btn.active {
      background-color: var(--bg-primary);
      border-color: var(--border-color);
      color: var(--text-accent);
      font-weight: 600;
    }

    /* Content Area */
    .view-header { 
      margin-bottom: 1.5rem; 
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }
    
    .view-title { 
      font-size: 1.35rem; 
      margin-bottom: 0.25rem; 
      font-weight: 600; 
    }
    
    .view-desc { 
      color: var(--text-muted); 
      font-size: 0.85rem; 
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      animation: tabFadeIn 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Service Cards */
    .service-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }
    
    .service-card:hover, .service-card:focus-within {
      transform: translateY(-2px) scale(1.015);
      border-color: var(--text-accent);
      box-shadow: 0 4px 12px var(--neon-glow);
    }
    
    .card-meta { 
      margin-bottom: 1rem; 
    }
    
    .card-title { 
      font-size: 1.05rem; 
      margin-bottom: 0.5rem; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
    }
    
    .card-desc { 
      color: var(--text-muted); 
      font-size: 0.85rem; 
      line-height: 1.4; 
      margin-bottom: 0.5rem; 
    }
    
    .card-pricing { 
      font-size: 0.725rem; 
      color: var(--text-accent); 
      font-weight: 500; 
      background: rgba(88, 166, 255, 0.08); 
      padding: 2px 6px; 
      border-radius: 4px; 
      display: inline-block; 
    }
    
    .launch-btn {
      align-self: flex-start;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.45rem 0.75rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 120ms ease;
    }
    
    .launch-btn:hover {
      background-color: var(--text-accent);
      color: var(--bg-primary);
      border-color: var(--text-accent);
    }

    /* Responsive Mobile Overrides */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { 
        width: 100%; 
        height: auto; 
        border-right: none; 
        border-bottom: 1px solid var(--border-color); 
        padding: 1rem; 
      }
      .brand { margin-bottom: 0.75rem; border-bottom: none; padding-bottom: 0; }
      .tab-nav { flex-direction: row; overflow-x: auto; padding-bottom: 0.25rem; }
      .tab-btn { padding: 0.5rem 0.75rem; width: auto; }
      #main-content { width: 100%; height: calc(100vh - 140px); padding: 1rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div class="brand">Control Layer</div>
    <nav>
      <ul class="tab-nav" id="tab-list"></ul>
    </nav>
  </aside>

  <main id="main-content">
    <div class="view-header" id="view-header-target"></div>
    <div class="card-grid" id="card-grid-target"></div>

        categoryTitle: "Hosting (No Gotchas)",

      },
      {

        categoryTitle: "Creative Apps",
        services: [
          { name: "Figma", url: "https://www.figma.com/", note: "Vector system layouts and human control interface structural designs", pricing: "3 Free active design files, unlimited collaborators", rank: 1 },
          { name: "Canva", url: "https://www.canva.com/", note: "Rapid programmatic visual composition engine for asset scaling pipelines", pricing: "Extensive Free structural assets & templates", rank: 2 }
        ]
      },
      {
        categoryId: "best-free-tiers",
        categoryTitle: "Truly Generous Free Tiers",
        services: [
          { name: "Cloudflare Pages", url: "https://pages.cloudflare.com/", note: "Unmetered edge networking layer completely eliminating data transfer fees", pricing: "Unlimited bandwidth, highly protective environment", rank: 1 },
          { name: "Cloudflare Workers", url: "https://workers.cloudflare.com/", note: "High execution request parameters allowing extensive serverless processing layers", pricing: "100,000 free operations executed per day", rank: 2 },
          { name: "GitHub Pages", url: "https://pages.github.com/", note: "Zero-cost operational platform backing instant frontend concept verification", pricing: "Completely zero friction, directly bound to code", rank: 3 },
          { name: "Supabase", url: "https://supabase.com/", note: "Bespoke database nodes complete with native vector calculation support lines", pricing: "2 database nodes with full operational capabilities", rank: 4 },
          { name: "Neon", url: "https://neon.tech/", note: "Postgres branching for isolation during rapid architectural experimentation", pricing: "Free tier covering primary branch processing requirements", rank: 5 }
        ]
      },
      {
        categoryId: "saas-starter-kits",
        categoryTitle: "SaaS Starter Kits (2026)",
        services: [
          { name: "Next.js AI Chatbot Starter", url: "https://github.com/vercel/ai-chatbot", note: "Vercel production-grade setup optimizing streaming model states and component injection", pricing: "Open-source MIT License architecture", rank: 1 },
          { name: "Supabase SaaS Boilerplate", url: "https://github.com/supabase-community/supabase-nextjs-tailwind-stripe-template", note: "End-to-end framework resolving authentication states, transactional maps, and relational databases", pricing: "Open-source production-ready codebase", rank: 2 }
        ]
      }
    ];

    const tabList = document.getElementById('tab-list');
    const gridTarget = document.getElementById('card-grid-target');
    const headerTarget = document.getElementById('view-header-target');

    function initializeDashboard() {
      SERVICES_DATA.forEach((cat, index) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
        btn.textContent = cat.categoryTitle;
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', index === 0 ? 'true' : 'false');
        btn.onclick = () => switchTab(cat.categoryId, btn);
        li.appendChild(btn);
        tabList.appendChild(li);
      });
      
      if(SERVICES_DATA.length > 0) {
        renderCategory(SERVICES_DATA[0].categoryId);
      }
    }

    function switchTab(catId, targetBtn) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        btn.setAttribute('aria-selected', 'false');
      });
      targetBtn.classList.add('active');
      targetBtn.setAttribute('aria-selected', 'true');
      renderCategory(catId);
    }

    function renderCategory(catId) {
      const activeData = SERVICES_DATA.find(c => c.categoryId === catId);
      if(!activeData) return;

      headerTarget.innerHTML = `
        <h1 class="view-title">${activeData.categoryTitle}</h1>
        <p class="view-desc">High-leverage operations orchestrated for optimal execution metrics.</p>
      `;

      gridTarget.innerHTML = '';
      activeData.services.forEach(srv => {
        const card = document.createElement('div');
        card.className = 'service-card';
        card.innerHTML = `
          <div class="card-meta">
            <div class="card-title">
              <strong>${srv.name}</strong>
              ${srv.tag ? `<span class="card-pricing" style="color:var(--text-primary); background:var(--border-color);">${srv.tag}</span>` : ''}
            </div>
            <p class="card-desc">${srv.note}</p>
            ${srv.pricing ? `<span class="card-pricing">${srv.pricing}</span>` : ''}
          </div>
          <a href="${srv.url}" target="_blank" rel="noopener noreferrer" class="launch-btn">Execute Link ↗</a>
        `;
        gridTarget.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', initializeDashboard);
  </script>
</body>
</html>
