<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Command 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.7);
            --apple-text: #1d1d1f;
            --airbnb-red: #FF385C;
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Hero Section - Apple Aesthetic */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 21px;
            color: #86868b;
            font-weight: 400;
        }

        /* Global Search - Airbnb Aesthetic */
        .search-container {
            background: #fff;
            border: 1px solid #dddddd;
            border-radius: 40px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: 40px auto;
            transition: box-shadow 0.2s ease;
        }

        .search-container:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        #global-prompt {
            border: none;
            flex-grow: 1;
            font-size: 16px;
            outline: none;
            color: #222;
        }

        .launch-btn {
            background: var(--airbnb-red);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s active;
        }

        .launch-btn:active {
            transform: scale(0.95);
        }

        /* Bento Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            font-weight: 600;
        }

        .card p {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 20px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #e8e8ed;
            color: #1d1d1f;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .visit-link {
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
        }

        .visit-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Command Center</h1>
        <p class="subtitle">Next-generation inference, orchestrated.</p>
        
        <div class="search-container">
            <input type="text" id="global-prompt" placeholder="Search across top models...">
            <button class="launch-btn" onclick="launchMulti()">Launch All</button>
        </div>
    </header>

    <div class="grid" id="node-grid">
        </div>
</div>

<script>
    const services = [
        { name: "Claude 4.7", company: "Anthropic", tag: "Logic S-Tier", desc: "Supreme reasoning and coding capability. Use for complex architecture.", url: "https://claude.ai", search: "https://claude.ai/chat?q=" },
        { name: "GPT-5.5 Pro", company: "OpenAI", tag: "Generalist", desc: "Highly reliable all-rounder with advanced web-browsing agents.", url: "https://chatgpt.com", search: "https://chatgpt.com/?q=" },
        { name: "Gemini 3.1", company: "Google", tag: "2M Context", desc: "Unmatched for massive document analysis and video understanding.", url: "https://gemini.google.com", search: "https://gemini.google.com/app?q=" },
        { name: "Groq LPU", company: "Groq", tag: "Instant", desc: "The world's fastest inference engine. Use for real-time applications.", url: "https://groq.com", search: "https://groq.com/?q=" },
        { name: "Perplexity Pro", company: "Perplexity", tag: "Research", desc: "Search-first engine with live citations and academic focus.", url: "https://perplexity.ai", search: "https://perplexity.ai/search?q=" },
        { name: "DeepSeek V4", company: "DeepSeek", tag: "Price/Perf", desc: "Highest intelligence-to-cost ratio. Excellent for technical debugging.", url: "https://chat.deepseek.com", search: "https://chat.deepseek.com/?q=" },
        { name: "HuggingChat", company: "HF", tag: "Open Source", desc: "Experimental access to the latest Llama and Qwen weights.", url: "https://huggingface.co/chat", search: "https://huggingface.co/chat/?q=" },
        { name: "Kimi K2.6", company: "Moonshot", tag: "Math/Vision", desc: "Specialized in advanced mathematical logic and multimodal tasks.", url: "https://kimi.moonshot.cn", search: "https://kimi.moonshot.cn/?q=" },
        { name: "Mistral Le Chat", company: "Mistral", tag: "Efficient", desc: "European champion model. Concise, fast, and highly capable.", url: "https://chat.mistral.ai", search: "https://chat.mistral.ai/chat?q=" },
        { name: "Duck.ai", company: "DuckDuckGo", tag: "Privacy", desc: "Completely anonymous access to major models without tracking.", url: "https://duck.ai", search: "https://duck.ai/?q=" }
    ];

    function render() {
        const grid = document.getElementById('node-grid');
        grid.innerHTML = services.map(s => `
            <div class="card" onclick="window.open('${s.url}', '_blank')">
                <div>
                    <span class="tag">${s.tag}</span>
                    <h3>${s.name}</h3>
                    <p>${s.desc}</p>
                </div>
                <div class="card-footer">
                    <span style="font-size: 12px; color: #86868b;">by ${s.company}</span>
                    <span class="visit-link">Open →</span>
                </div>
            </div>
        `).join('');
    }

    function launchMulti() {
        const query = encodeURIComponent(document.getElementById('global-prompt').value);
        if(!query) return alert("Please enter a prompt.");
        
        // Launch top 3 performers
        const targets = [services[0], services[1], services[4]]; 
        targets.forEach(s => {
            window.open(`${s.search}${query}`, '_blank');
        });
    }

    render();
</script>
</body>
</html>
